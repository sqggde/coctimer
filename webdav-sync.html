<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDAV 备份同步 - 部落小工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                        success: '#10b981',
                        danger: '#ef4444',
                        dark: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        input:focus { outline: none; }
        .saving-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 max-w-lg">
        <!-- 顶栏 -->
        <div class="sticky top-0 z-10 bg-gray-50 pt-3 pb-2">
            <div class="flex items-center justify-between">
                <a href="./index.html" class="text-gray-500 hover:text-gray-700 px-2 py-1">
                    <i class="fa fa-arrow-left"></i>
                </a>
                <h1 class="font-bold text-gray-800 text-base"><i class="fa fa-server mr-2"></i>WebDAV 备份同步</h1>
                <div></div>
            </div>
        </div>

        <!-- 状态卡片 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-3">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-medium text-gray-700">同步状态</span>
                <span id="webdav-status-badge" class="px-3 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-500">
                    <i class="fa fa-minus-circle mr-1"></i>未配置
                </span>
            </div>
            <div id="webdav-info-area" class="text-xs text-gray-500 space-y-1 hidden">
                <div><span class="text-gray-400">服务器：</span><span id="info-server" class="text-gray-700"></span></div>
                <div><span class="text-gray-400">账号：</span><span id="info-username" class="text-gray-700"></span></div>
                <div><span class="text-gray-400">目录：</span><span id="info-folder" class="text-gray-700"></span></div>
                <div><span class="text-gray-400">最后同步：</span><span id="info-last-sync" class="text-gray-700">从未</span></div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-3">
            <div class="flex space-x-2">
                <button id="webdav-backup-btn" class="flex-1 px-3 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white disabled:text-gray-500 rounded-lg transition-all duration-200 text-sm flex items-center justify-center font-medium" disabled>
                    <i class="fa fa-cloud-upload mr-2"></i>上传备份
                </button>
                <button id="webdav-restore-btn" class="flex-1 px-3 py-2.5 bg-purple-600 hover:bg-purple-700 disabled:bg-gray-300 text-white disabled:text-gray-500 rounded-lg transition-all duration-200 text-sm flex items-center justify-center font-medium" disabled>
                    <i class="fa fa-cloud-download mr-2"></i>导入恢复
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-2 text-center">只保留最新一份备份，同名文件会被覆盖</p>
        </div>

        <!-- 配置表单 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-3">
            <h2 class="text-sm font-medium text-gray-700 mb-3"><i class="fa fa-cog mr-1"></i>服务器配置</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">启用 WebDAV 同步</label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="webdav-enabled-toggle" class="sr-only peer">
                        <div class="w-10 h-6 bg-gray-300 rounded-full peer peer-checked:bg-green-500 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-4"></div>
                        <span id="enabled-label" class="ml-2 text-sm text-gray-600">关闭</span>
                    </label>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">WebDAV 服务器地址</label>
                    <input type="url" id="webdav-server" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" placeholder="例如 https://dav.jianguoyun.com/dav/">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">WebDAV 账号</label>
                    <input type="text" id="webdav-username" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" placeholder="邮箱或用户名">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">WebDAV 密码</label>
                    <input type="password" id="webdav-password" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" placeholder="坚果云用户请使用应用专用密码">
                    <p class="text-xs text-gray-400 mt-1">🔑 坚果云用户请在「账户信息 → 安全选项 → 第三方应用管理」生成应用专用密码</p>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">文件夹名称</label>
                    <input type="text" id="webdav-folder" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" placeholder="例如 COC_Timer（自动创建）" value="COC_Timer">
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-3">
            <div class="flex space-x-2">
                <button id="webdav-test-btn" class="flex-1 px-3 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg transition-all duration-200 text-sm flex items-center justify-center font-medium">
                    <i class="fa fa-plug mr-2"></i>测试连接
                </button>
                <button id="webdav-save-btn" class="flex-1 px-3 py-2 bg-primary hover:bg-primary/90 text-white rounded-lg transition-all duration-200 text-sm flex items-center justify-center font-medium">
                    <i class="fa fa-check mr-2"></i>保存设置
                </button>
            </div>
            <div id="webdav-status-msg" class="text-xs text-center mt-2 hidden"></div>
        </div>

        <!-- 回到主页面 -->
        <div class="text-center pb-6">
            <a href="./index.html" class="text-xs text-gray-400 hover:text-gray-600">
                <i class="fa fa-arrow-left mr-1"></i>返回主页面
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 hidden pointer-events-none">
        <div id="toast-text" class="bg-gray-700 text-white px-5 py-3 rounded-lg shadow-lg text-sm"></div>
    </div>

    <script>
        // 检查是否从服务器打开
        if (location.protocol === 'file:') {
            document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red;"><h2>❌ 请通过 Web 服务器访问此页面</h2><p style="color:#666;margin-top:12px;">不要直接双击打开 HTML 文件，请通过 <code>https://sqggde.github.io/coctimer/</code><br>或 <code>https://coctimer.pages.dev/</code> 访问</p><a href="./index.html" style="display:inline-block;margin-top:16px;color:#3b82f6;">返回主页面</a></div>';
            throw new Error('file protocol detected');
        }
        // ========== WebDAV 同步页面 ==========
        const WEBDAV_API = 'https://coctimer.pages.dev/api/webdav';
        const WEBDAV_CONFIG_KEY = 'coc_webdav_config';
        const STORAGE_KEY = 'clash_upgrade_assistant_v3_fixed';
        const SETTINGS_KEY = 'clash_upgrade_settings';

        // DOM 元素
        const statusBadge = document.getElementById('webdav-status-badge');
        const infoArea = document.getElementById('webdav-info-area');
        const infoServer = document.getElementById('info-server');
        const infoUsername = document.getElementById('info-username');
        const infoFolder = document.getElementById('info-folder');
        const infoLastSync = document.getElementById('info-last-sync');
        const backupBtn = document.getElementById('webdav-backup-btn');
        const restoreBtn = document.getElementById('webdav-restore-btn');
        const enabledToggle = document.getElementById('webdav-enabled-toggle');
        const enabledLabel = document.getElementById('enabled-label');
        const serverInput = document.getElementById('webdav-server');
        const usernameInput = document.getElementById('webdav-username');
        const passwordInput = document.getElementById('webdav-password');
        const folderInput = document.getElementById('webdav-folder');
        const testBtn = document.getElementById('webdav-test-btn');
        const saveBtn = document.getElementById('webdav-save-btn');
        const statusMsg = document.getElementById('webdav-status-msg');

        // Toast
        function showToast(text, duration) {
            const el = document.getElementById('toast');
            const textEl = document.getElementById('toast-text');
            textEl.textContent = text;
            el.classList.remove('hidden');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.add('hidden'), duration || 2000);
        }

        function showMsg(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = 'text-xs text-center mt-2 ' + (type === 'red' ? 'text-red-500' : 'text-green-500');
            statusMsg.classList.remove('hidden');
        }

        // 加载配置
        let config = { enabled: false, server: '', username: '', password: '', folder: 'COC_Timer', lastSync: '' };
        try {
            const saved = localStorage.getItem(WEBDAV_CONFIG_KEY);
            if (saved) config = { ...config, ...JSON.parse(saved) };
        } catch (e) {}

        function updateUI() {
            const hasConfig = config.server && config.username && config.password;
            const active = config.enabled && hasConfig;

            if (active) {
                statusBadge.className = 'px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700';
                statusBadge.innerHTML = '<i class="fa fa-check-circle mr-1"></i>已启用';
                backupBtn.disabled = false;
                restoreBtn.disabled = false;
            } else if (hasConfig) {
                statusBadge.className = 'px-3 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700';
                statusBadge.innerHTML = '<i class="fa fa-pause-circle mr-1"></i>已暂停';
                backupBtn.disabled = true;
                restoreBtn.disabled = true;
            } else {
                statusBadge.className = 'px-3 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-500';
                statusBadge.innerHTML = '<i class="fa fa-minus-circle mr-1"></i>未配置';
                backupBtn.disabled = true;
                restoreBtn.disabled = true;
            }

            // 信息区域
            if (hasConfig) {
                infoArea.classList.remove('hidden');
                infoServer.textContent = config.server;
                infoUsername.textContent = config.username;
                infoFolder.textContent = config.folder;
                infoLastSync.textContent = config.lastSync || '从未';
            } else {
                infoArea.classList.add('hidden');
            }

            // 表单
            enabledToggle.checked = config.enabled;
            enabledLabel.textContent = config.enabled ? '开启' : '关闭';
            serverInput.value = config.server || '';
            usernameInput.value = config.username || '';
            passwordInput.value = config.password || '';
            folderInput.value = config.folder || 'COC_Timer';
        }

        // 启用开关
        enabledToggle.addEventListener('change', () => {
            enabledLabel.textContent = enabledToggle.checked ? '开启' : '关闭';
        });

        // 测试连接
        testBtn.addEventListener('click', async () => {
            const server = serverInput.value.trim();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const folder = folderInput.value.trim() || 'COC_Timer';
            if (!server || !username || !password) {
                showMsg('请填写服务器地址、账号和密码', 'red'); return;
            }
            testBtn.disabled = true;
            testBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>测试中...';
            statusMsg.classList.add('hidden');
            try {
                const res = await fetch(WEBDAV_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'test', server, username, password, folder }),
                });
                const text = await res.text();
                let result;
                try { result = JSON.parse(text); } catch {
                    showMsg('❌ 服务器返回了非 JSON 内容，可能地址不对或未部署：' + text.substring(0, 120), 'red');
                    return;
                }
                showMsg(result.success ? '✅ 连接成功！' : '❌ ' + (result.error || '连接失败'), result.success ? 'green' : 'red');
            } catch (err) {
                showMsg('❌ 网络错误：' + err.message, 'red');
            } finally {
                testBtn.disabled = false;
                testBtn.innerHTML = '<i class="fa fa-plug mr-2"></i>测试连接';
            }
        });

        // 保存设置
        saveBtn.addEventListener('click', () => {
            config = {
                enabled: enabledToggle.checked,
                server: serverInput.value.trim(),
                username: usernameInput.value.trim(),
                password: passwordInput.value,
                folder: folderInput.value.trim() || 'COC_Timer',
                lastSync: config.lastSync || '',
            };
            try { localStorage.setItem(WEBDAV_CONFIG_KEY, JSON.stringify(config)); } catch (e) {}
            updateUI();
            showMsg('✅ 设置已保存', 'green');
        });

        // 上传备份
        backupBtn.addEventListener('click', async () => {
            if (!config.enabled) { showToast('请先启用 WebDAV 同步', 2000); return; }

            // 从 localStorage 读取数据
            const raw = localStorage.getItem(STORAGE_KEY);
            let accounts = {}, accountNotes = {}, accountOrder = [], currentAccount = null, settings = {};
            if (raw) {
                try {
                    const saved = JSON.parse(raw);
                    accounts = saved.accounts || {};
                    accountNotes = saved.accountNotes || {};
                    accountOrder = saved.accountOrder || [];
                    currentAccount = saved.currentAccount || null;
                } catch (e) {}
            }
            try {
                const rawSettings = localStorage.getItem(SETTINGS_KEY);
                if (rawSettings) settings = JSON.parse(rawSettings);
            } catch (e) {}

            const backupData = {
                version: 1,
                exportDate: new Date().toISOString(),
                accounts,
                accountNotes,
                accountOrder,
                currentAccount,
                settings,
            };

            backupBtn.disabled = true;
            const origHtml = backupBtn.innerHTML;
            backupBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>上传中...';

            try {
                const res = await fetch(WEBDAV_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'backup',
                        server: config.server,
                        username: config.username,
                        password: config.password,
                        folder: config.folder,
                        data: backupData,
                    }),
                });
                const text = await res.text();
                let result;
                try { result = JSON.parse(text); } catch {
                    showToast('❌ 服务器返回异常：' + text.substring(0, 80), 3000);
                    return;
                }
                if (result.success) {
                    config.lastSync = new Date().toLocaleString('zh-CN');
                    try { localStorage.setItem(WEBDAV_CONFIG_KEY, JSON.stringify(config)); } catch (e) {}
                    updateUI();
                    showToast('✅ WebDAV 备份成功', 2000);
                } else {
                    showToast('❌ 备份失败：' + (result.error || '未知错误'), 3000);
                }
            } catch (err) {
                showToast('❌ 备份失败（网络错误）：' + err.message, 3000);
            } finally {
                backupBtn.disabled = false;
                backupBtn.innerHTML = origHtml;
            }
        });

        // 导入恢复
        restoreBtn.addEventListener('click', async () => {
            if (!config.enabled) { showToast('请先启用 WebDAV 同步', 2000); return; }
            if (!confirm('从 WebDAV 恢复将覆盖当前所有本地数据，确定继续？')) return;

            restoreBtn.disabled = true;
            const origHtml = restoreBtn.innerHTML;
            restoreBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>恢复中...';

            try {
                const res = await fetch(WEBDAV_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'restore',
                        server: config.server,
                        username: config.username,
                        password: config.password,
                        folder: config.folder,
                    }),
                });
                const text = await res.text();
                let result;
                try { result = JSON.parse(text); } catch {
                    showToast('❌ 服务器返回异常：' + text.substring(0, 80), 3000);
                    return;
                }
                if (result.success && result.data) {
                    const backup = result.data;
                    const dataToRestore = backup.accounts ? backup : backup.data;
                    if (!dataToRestore || !dataToRestore.accounts) {
                        showToast('备份数据格式无效', 3000);
                        return;
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToRestore));
                    if (backup.settings || dataToRestore.settings) {
                        localStorage.setItem(SETTINGS_KEY, JSON.stringify(backup.settings || dataToRestore.settings));
                    }
                    showToast('✅ WebDAV 恢复成功！即将刷新', 1500);
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('❌ 恢复失败：' + (result.error || '未找到备份数据'), 3000);
                }
            } catch (err) {
                showToast('❌ 恢复失败（网络错误）：' + err.message, 3000);
            } finally {
                restoreBtn.disabled = false;
                restoreBtn.innerHTML = origHtml;
            }
        });

        // 初始化
        updateUI();
    </script>
</body>
</html>
